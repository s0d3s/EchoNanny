services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: echonanny-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
      # Linux audio passthrough example (uncomment if needed):
      # - /dev/snd:/dev/snd

  frontend:
    build:
      context: ./frontend
    container_name: echonanny-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
